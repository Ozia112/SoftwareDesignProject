name: Project Status Automation (Ready / In Review)

on:
  issues:
    types: [assigned]
  pull_request:
    types: [review_requested]
  workflow_dispatch:

jobs:
  issue_assigned_to_ready:
    if: ${{ github.event_name == 'issues' && github.event.action == 'assigned' }}
    runs-on: ubuntu-latest
    env:
      PROJECT_OWNER: ${{ vars.project_owner || vars.project_onwer }}
      PROJECT_NUMBER: ${{ vars.project_number }}
      TARGET_STATUS: Ready
    steps:
      - name: Move assigned issue to Ready
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN }}
          script: |
            const contentId = context.payload.issue.node_id;

            async function loadProject(login, number) {
              const q = `
                query($login:String!, $number:Int!) {
                  organization(login:$login) {
                    projectV2(number:$number) {
                      id
                      fields(first:50) {
                        nodes { ... on ProjectV2SingleSelectField { id name options { id name } } }
                      }
                    }
                  }
                  user(login:$login) {
                    projectV2(number:$number) {
                      id
                      fields(first:50) {
                        nodes { ... on ProjectV2SingleSelectField { id name options { id name } } }
                      }
                    }
                  }
                }`;
              const data = await github.graphql(q, { login, number });
              const p = data.organization?.projectV2 ?? data.user?.projectV2;
              if (!p) throw new Error(`No se encontró ProjectV2 ${login}/#${number}`);
              const statusField = p.fields.nodes.find(f => f?.name === "Status");
              if (!statusField) throw new Error(`No existe el campo 'Status' en el Project`);
              return { projectId: p.id, statusField };
            }

            async function ensureItem(projectId, contentId) {
              const q = `
                query($id:ID!) {
                  node(id:$id) {
                    ... on Issue {
                      projectItems(first:20) { nodes { id project { id } } }
                    }
                  }
                }`;
              const data = await github.graphql(q, { id: contentId });
              const items = data.node?.projectItems?.nodes ?? [];
              const existing = items.find(it => it.project?.id === projectId);
              if (existing) return existing.id;

              const m = `
                mutation($projectId:ID!, $contentId:ID!) {
                  addProjectV2ItemById(input:{projectId:$projectId, contentId:$contentId}) {
                    item { id }
                  }
                }`;
              const added = await github.graphql(m, { projectId, contentId });
              return added.addProjectV2ItemById.item.id;
            }

            async function getCurrentStatus(itemId) {
              const q = `
                query($itemId:ID!) {
                  node(id:$itemId) {
                    ... on ProjectV2Item {
                      fieldValueByName(name:"Status") {
                        ... on ProjectV2ItemFieldSingleSelectValue { name }
                      }
                    }
                  }
                }`;
              const data = await github.graphql(q, { itemId });
              return data.node?.fieldValueByName?.name ?? null;
            }

            async function setStatus(projectId, itemId, fieldId, optionId) {
              const m = `
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                  updateProjectV2ItemFieldValue(input:{
                    projectId:$projectId,
                    itemId:$itemId,
                    fieldId:$fieldId,
                    value:{ singleSelectOptionId:$optionId }
                  }) { projectV2Item { id } }
                }`;
              await github.graphql(m, { projectId, itemId, fieldId, optionId });
            }

            const owner = process.env.PROJECT_OWNER;
            const number = parseInt(process.env.PROJECT_NUMBER, 10);
            const target = process.env.TARGET_STATUS;

            if (!owner || !number) throw new Error("Faltan vars: project_owner/project_onwer y/o project_number.");

            const { projectId, statusField } = await loadProject(owner, number);
            const option = statusField.options.find(o => o.name === target);
            if (!option) throw new Error(`No existe Status='${target}' en el Project`);

            const itemId = await ensureItem(projectId, contentId);

            // No degradar si ya está avanzado
            const current = await getCurrentStatus(itemId);
            if (["In Progress", "In Review", "Done"].includes(current)) {
              core.info(`Skip: Status actual = ${current}`);
              return;
            }

            await setStatus(projectId, itemId, statusField.id, option.id);

  review_requested_to_in_review:
    if: ${{ github.event_name == 'pull_request' && github.event.action == 'review_requested' }}
    runs-on: ubuntu-latest
    env:
      PROJECT_OWNER: ${{ vars.project_owner || vars.project_onwer }}
      PROJECT_NUMBER: ${{ vars.project_number }}
      TARGET_STATUS: In Review
    steps:
      - name: Resolve related issue (linked > psd-XX > wk-NN)
        id: resolve
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            // 1) Preferido: issues vinculados por "Closes/Fixes #123"
            const qLinked = `
              query($owner:String!, $repo:String!, $number:Int!) {
                repository(owner:$owner, name:$repo) {
                  pullRequest(number:$number) {
                    closingIssuesReferences(first:10) { nodes { id number title } }
                  }
                }
              }`;
            const data = await github.graphql(qLinked, { owner, repo, number: prNumber });
            const linked = data.repository.pullRequest.closingIssuesReferences.nodes ?? [];
            if (linked.length > 0) {
              core.setOutput("issue_node_id", linked[0].id);
              core.setOutput("resolved_by", "linked");
              return;
            }

            const ref = context.payload.pull_request.head.ref;

            // 2) Fallback PSD: docs/psd-XX-...
            const mPsd = ref.match(/psd-(\d{2})/i);
            if (mPsd) {
              const psd = mPsd[1];
              const search = await github.rest.search.issuesAndPullRequests({
                q: `repo:${owner}/${repo} is:issue is:open in:title PSD-${psd}-`,
                per_page: 5
              });
              const issue = search.data.items.find(i => !i.pull_request);
              if (issue) {
                core.setOutput("issue_node_id", issue.node_id);
                core.setOutput("resolved_by", "psd-branch");
                return;
              }
            }

            // 3) Fallback Weekly: docs/meetings/wk-NN-...
            const mWk = ref.match(/wk-(\d{2})/i);
            if (mWk) {
              const wk = mWk[1];
              const wkLabel = `Semana ${wk}`;
              const search = await github.rest.search.issuesAndPullRequests({
                q: `repo:${owner}/${repo} is:issue is:open in:title Weekly in:title "${wkLabel}"`,
                per_page: 10
              });
              const issue = search.data.items.find(i => !i.pull_request);
              if (issue) {
                core.setOutput("issue_node_id", issue.node_id);
                core.setOutput("resolved_by", "weekly-branch");
                return;
              }
            }

            core.setOutput("issue_node_id", "");
            core.setOutput("resolved_by", "none");
            core.warning(`No se pudo resolver issue para PR. Rama: ${ref}`);

      - name: Move resolved issue to In Review
        if: ${{ steps.resolve.outputs.issue_node_id != '' }}
        uses: actions/github-script@v7
        env:
          ISSUE_NODE_ID: ${{ steps.resolve.outputs.issue_node_id }}
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN }}
          script: |
            const contentId = process.env.ISSUE_NODE_ID;

            async function loadProject(login, number) {
              const q = `
                query($login:String!, $number:Int!) {
                  organization(login:$login) {
                    projectV2(number:$number) {
                      id
                      fields(first:50) {
                        nodes { ... on ProjectV2SingleSelectField { id name options { id name } } }
                      }
                    }
                  }
                  user(login:$login) {
                    projectV2(number:$number) {
                      id
                      fields(first:50) {
                        nodes { ... on ProjectV2SingleSelectField { id name options { id name } } }
                      }
                    }
                  }
                }`;
              const data = await github.graphql(q, { login, number });
              const p = data.organization?.projectV2 ?? data.user?.projectV2;
              if (!p) throw new Error(`No se encontró ProjectV2 ${login}/#${number}`);
              const statusField = p.fields.nodes.find(f => f?.name === "Status");
              if (!statusField) throw new Error(`No existe el campo 'Status' en el Project`);
              return { projectId: p.id, statusField };
            }

            async function ensureItem(projectId, contentId) {
              const q = `
                query($id:ID!) {
                  node(id:$id) {
                    ... on Issue {
                      projectItems(first:20) { nodes { id project { id } } }
                    }
                  }
                }`;
              const data = await github.graphql(q, { id: contentId });
              const items = data.node?.projectItems?.nodes ?? [];
              const existing = items.find(it => it.project?.id === projectId);
              if (existing) return existing.id;

              const m = `
                mutation($projectId:ID!, $contentId:ID!) {
                  addProjectV2ItemById(input:{projectId:$projectId, contentId:$contentId}) {
                    item { id }
                  }
                }`;
              const added = await github.graphql(m, { projectId, contentId });
              return added.addProjectV2ItemById.item.id;
            }

            async function getCurrentStatus(itemId) {
              const q = `
                query($itemId:ID!) {
                  node(id:$itemId) {
                    ... on ProjectV2Item {
                      fieldValueByName(name:"Status") {
                        ... on ProjectV2ItemFieldSingleSelectValue { name }
                      }
                    }
                  }
                }`;
              const data = await github.graphql(q, { itemId });
              return data.node?.fieldValueByName?.name ?? null;
            }

            async function setStatus(projectId, itemId, fieldId, optionId) {
              const m = `
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                  updateProjectV2ItemFieldValue(input:{
                    projectId:$projectId,
                    itemId:$itemId,
                    fieldId:$fieldId,
                    value:{ singleSelectOptionId:$optionId }
                  }) { projectV2Item { id } }
                }`;
              await github.graphql(m, { projectId, itemId, fieldId, optionId });
            }

            const owner = process.env.PROJECT_OWNER;
            const number = parseInt(process.env.PROJECT_NUMBER, 10);
            const target = process.env.TARGET_STATUS;

            if (!owner || !number) throw new Error("Faltan vars: project_owner/project_onwer y/o project_number.");

            const { projectId, statusField } = await loadProject(owner, number);
            const option = statusField.options.find(o => o.name === target);
            if (!option) throw new Error(`No existe Status='${target}' en el Project`);

            const itemId = await ensureItem(projectId, contentId);

            // No tocar si ya está Done
            const current = await getCurrentStatus(itemId);
            if (current === "Done") {
              core.info("Skip: ya está Done");
              return;
            }

            await setStatus(projectId, itemId, statusField.id, option.id);
