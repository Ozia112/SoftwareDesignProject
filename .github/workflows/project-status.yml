name: Projects Status Sync (Issue ↔ PR)

on:
  issues:
    types: [assigned]
  pull_request:
    types: [opened, reopened, ready_for_review, review_requested, closed]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      PROJECT_OWNER: ${{ vars.project_owner }}
      PROJECT_NUMBER: ${{ vars.project_number }}
    steps:
      - name: Sync Project Status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN }}
          script: |
            const eventName = context.eventName;
            const action = context.payload.action;

            // -------------------------
            // Helpers (ProjectV2)
            // -------------------------
            async function loadProject(login, number) {
              const q = `
                query($login:String!, $number:Int!) {
                  repositoryOwner(login:$login) {
                    ... on User {
                      projectV2(number:$number) {
                        id
                        fields(first:50) {
                          nodes {
                            ... on ProjectV2SingleSelectField { id name options { id name } }
                          }
                        }
                      }
                    }
                    ... on Organization {
                      projectV2(number:$number) {
                        id
                        fields(first:50) {
                          nodes {
                            ... on ProjectV2SingleSelectField { id name options { id name } }
                          }
                        }
                      }
                    }
                  }
                }`;
              const data = await github.graphql(q, { login, number });
              const p = data.repositoryOwner?.projectV2;
              if (!p) throw new Error(`No se encontró ProjectV2 ${login}/#${number}`);
              const statusField = p.fields.nodes.find(f => f?.name === "Status");
              if (!statusField) throw new Error(`No existe el campo 'Status' en el Project`);
              return { projectId: p.id, statusField };
            }

            function pickStatusOption(statusField, name) {
              const opt = statusField.options.find(o => o.name === name);
              return opt?.id || null;
            }

            async function ensureProjectItem(projectId, contentId) {
              const q = `
                query($id:ID!) {
                  node(id:$id) {
                    ... on Issue { projectItems(first:20) { nodes { id project { id } } } }
                    ... on PullRequest { projectItems(first:20) { nodes { id project { id } } } }
                  }
                }`;
              const data = await github.graphql(q, { id: contentId });
              const items = data.node?.projectItems?.nodes ?? [];
              const existing = items.find(it => it.project?.id === projectId);
              if (existing) return existing.id;

              const m = `
                mutation($projectId:ID!, $contentId:ID!) {
                  addProjectV2ItemById(input:{projectId:$projectId, contentId:$contentId}) {
                    item { id }
                  }
                }`;
              const added = await github.graphql(m, { projectId, contentId });
              return added.addProjectV2ItemById.item.id;
            }

            async function setStatus({ projectId, statusField }, contentNodeId, statusName) {
              let optionId = pickStatusOption(statusField, statusName);

              // Fallback: si no existe Archived, usar Done
              if (!optionId && statusName === "Archived") {
                core.warning("Status 'Archived' no existe en el Project. Fallback -> Done");
                optionId = pickStatusOption(statusField, "Done");
              }
              if (!optionId) throw new Error(`No existe Status='${statusName}' en el Project`);

              const itemId = await ensureProjectItem(projectId, contentNodeId);
              const m = `
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                  updateProjectV2ItemFieldValue(input:{
                    projectId:$projectId,
                    itemId:$itemId,
                    fieldId:$fieldId,
                    value:{ singleSelectOptionId:$optionId }
                  }) { projectV2Item { id } }
                }`;
              await github.graphql(m, {
                projectId,
                itemId,
                fieldId: statusField.id,
                optionId
              });
            }

            // -------------------------
            // Helpers (Issue resolution)
            // -------------------------
            function parseIssueNumberFromBranch(branch) {
              // 22-... (formato típico al crear rama desde Issue).
              const m = (branch || "").match(/(?:^|\/)(\d+)-/);
              return m ? parseInt(m[1], 10) : null;
            }

            async function getIssueByNumber(issueNumber) {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
              return {
                number: issueNumber,
                nodeId: issue.data.node_id,
                state: issue.data.state
              };
            }

            async function closeIssueIfOpen(issueNumber) {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
              if (issue.data.state !== "closed") {
                await github.rest.issues.update({ owner, repo, issue_number: issueNumber, state: "closed" });
              }
            }

            // -------------------------
            // Load project context
            // -------------------------
            const projectOwner = process.env.PROJECT_OWNER;
            const projectNumber = parseInt(process.env.PROJECT_NUMBER, 10);
            if (!projectOwner || !projectNumber) throw new Error("Faltan vars: project_owner y/o project_number.");

            const projectCtx = await loadProject(projectOwner, projectNumber);

            // -------------------------
            // Event routing
            // -------------------------

            // A) Issue assigned -> Ready (Issue)
            if (eventName === "issues" && action === "assigned") {
              const issueNodeId = context.payload.issue.node_id;
              await setStatus(projectCtx, issueNodeId, "Ready");
              return;
            }

            // A partir de aquí: eventos de PR
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info(`Skip: evento sin pull_request (eventName=${eventName}, action=${action})`);
              return;
            }

            // Skip forks (secrets no disponibles en forks / por seguridad)
            if (pr.head?.repo?.full_name !== process.env.GITHUB_REPOSITORY) {
              core.info("Skip: PR desde fork.");
              return;
            }

            const prNodeId = pr.node_id;
            const branch = pr.head.ref;
            const issueNumber = parseIssueNumberFromBranch(branch);

            if (!issueNumber) {
              core.warning(`No se pudo resolver issue desde rama: ${branch}`);
              // Aun así, actualiza el PR si aplica
            }

            const issue = issueNumber ? await getIssueByNumber(issueNumber) : null;

            // B) PR opened / reopened / ready_for_review -> In Progress (PR + Issue)
            if (eventName === "pull_request" && ["opened", "reopened", "ready_for_review"].includes(action)) {
              await setStatus(projectCtx, prNodeId, "In Progress");
              if (issue) await setStatus(projectCtx, issue.nodeId, "In Progress");
              return;
            }

            // C) review requested -> In Review (PR + Issue)
            if (eventName === "pull_request" && action === "review_requested") {
              await setStatus(projectCtx, prNodeId, "In Review");
              if (issue) await setStatus(projectCtx, issue.nodeId, "In Review");
              return;
            }

            // D) review submitted: changes_requested -> In Progress ; approved -> Done
            if (eventName === "pull_request_review" && action === "submitted") {
              const state = (context.payload.review?.state || "").toLowerCase();
              if (state === "changes_requested") {
                await setStatus(projectCtx, prNodeId, "In Progress");
                if (issue) await setStatus(projectCtx, issue.nodeId, "In Progress");
                return;
              }              if (state === "approved") {
                // Política: "Done" solo al merge. Mantener en "In Review" (o no cambiar estado).
                core.info("Review approved: sin cambio de estado (Done solo al merge).");
                return;
              }
              core.info(`Skip: review.state=${state}`);
              return;
            }

            // E) PR closed: merged -> Done + close Issue; not merged -> Archived + close Issue
            if (eventName === "pull_request" && action === "closed") {
              const merged = !!pr.merged;
              const status = merged ? "Done" : "Archived";
              await setStatus(projectCtx, prNodeId, status);
              if (issue) {
                await setStatus(projectCtx, issue.nodeId, status);
                await closeIssueIfOpen(issue.number);
              }
              return;
            }

            core.info(`No rule matched (eventName=${eventName}, action=${action})`);
